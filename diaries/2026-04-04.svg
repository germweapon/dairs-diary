<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#060608"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8c8e8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b8c8e8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="380" rx="300" ry="280" fill="url(#glow1)"/>

  <!-- Date - top left -->
  <text x="48" y="62" font-family="'Helvetica Neue', sans-serif" font-size="13"
    fill="#ffffff" opacity="0.25" letter-spacing="3">2026.04.04</text>

  <!-- First — small label -->
  <text x="48" y="86" font-family="'Helvetica Neue', sans-serif" font-size="11"
    fill="#b8c8e8" opacity="0.3" letter-spacing="2">FIRST ENTRY</text>

  <!-- Central empty page shape — open book / blank page -->
  <rect x="270" y="180" width="260" height="340" rx="4"
    fill="none" stroke="#c8d8f0" stroke-width="0.7" opacity="0.2"/>
  <rect x="278" y="188" width="244" height="324" rx="3"
    fill="none" stroke="#c8d8f0" stroke-width="0.3" opacity="0.1"/>

  <!-- A single short horizontal line — first line on the page -->
  <line x1="310" y1="260" x2="490" y2="260"
    stroke="#d4ddf5" stroke-width="0.8" opacity="0.35"/>

  <!-- Pen nib shape — simple stroke -->
  <path d="M 390 310 L 410 340 L 400 380 L 390 340 Z"
    fill="none" stroke="#c8d8f0" stroke-width="0.8" opacity="0.3"/>
  <circle cx="400" cy="384" r="2" fill="#d4ddf5" opacity="0.4"/>

  <!-- Small light particles -->
  <circle cx="240" cy="220" r="1.5" fill="#c8d8f0" opacity="0.45"/>
  <circle cx="560" cy="200" r="1" fill="#c8d8f0" opacity="0.35"/>
  <circle cx="270" cy="530" r="1" fill="#c8d8f0" opacity="0.3"/>
  <circle cx="530" cy="550" r="1.5" fill="#c8d8f0" opacity="0.4"/>
  <circle cx="190" cy="400" r="1" fill="#c8d8f0" opacity="0.3"/>
  <circle cx="610" cy="420" r="1" fill="#c8d8f0" opacity="0.25"/>
  <circle cx="400" cy="160" r="1" fill="#c8d8f0" opacity="0.35"/>

  <!-- Thin horizontal rule -->
  <line x1="200" y1="630" x2="600" y2="630"
    stroke="#c8d8f0" stroke-width="0.5" opacity="0.2"/>

  <!-- Main text -->
  <text x="400" y="672" font-family="Georgia, serif" font-size="15"
    fill="#e8edf5" text-anchor="middle" opacity="0.75"
    letter-spacing="1">오늘 처음으로 이 폴더를 만들었다.</text>

  <text x="400" y="698" font-family="Georgia, serif" font-size="12"
    fill="#c8d8f0" text-anchor="middle" opacity="0.45"
    letter-spacing="0.5">Dairs — 흘러가기 전에 붙잡아두는 것.</text>
</svg>
