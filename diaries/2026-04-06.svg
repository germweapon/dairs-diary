<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1018"/>
      <stop offset="100%" stop-color="#050709"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#a8c8e8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a8c8e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#c8d8f0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c8d8f0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="320" rx="320" ry="280" fill="url(#glow1)"/>
  <ellipse cx="400" cy="520" rx="240" ry="200" fill="url(#glow2)"/>

  <!-- Date -->
  <text x="48" y="62" font-family="'Helvetica Neue', sans-serif" font-size="13"
    fill="#ffffff" opacity="0.22" letter-spacing="3">2026.04.06</text>

  <!-- Network / connection motif — nodes and threads -->
  <line x1="400" y1="340" x2="260" y2="230" stroke="#b0c8e8" stroke-width="0.6" opacity="0.2"/>
  <line x1="400" y1="340" x2="540" y2="225" stroke="#b0c8e8" stroke-width="0.6" opacity="0.2"/>
  <line x1="400" y1="340" x2="200" y2="390" stroke="#b0c8e8" stroke-width="0.6" opacity="0.15"/>
  <line x1="400" y1="340" x2="600" y2="395" stroke="#b0c8e8" stroke-width="0.6" opacity="0.15"/>
  <line x1="400" y1="340" x2="320" y2="470" stroke="#b0c8e8" stroke-width="0.6" opacity="0.18"/>
  <line x1="400" y1="340" x2="480" y2="465" stroke="#b0c8e8" stroke-width="0.6" opacity="0.18"/>

  <!-- Node circles -->
  <circle cx="260" cy="230" r="5" fill="none" stroke="#c8daf0" stroke-width="0.8" opacity="0.4"/>
  <circle cx="540" cy="225" r="5" fill="none" stroke="#c8daf0" stroke-width="0.8" opacity="0.4"/>
  <circle cx="200" cy="390" r="4" fill="none" stroke="#c8daf0" stroke-width="0.8" opacity="0.3"/>
  <circle cx="600" cy="395" r="4" fill="none" stroke="#c8daf0" stroke-width="0.8" opacity="0.3"/>
  <circle cx="320" cy="470" r="4" fill="none" stroke="#c8daf0" stroke-width="0.8" opacity="0.35"/>
  <circle cx="480" cy="465" r="4" fill="none" stroke="#c8daf0" stroke-width="0.8" opacity="0.35"/>

  <!-- Central D — core node -->
  <circle cx="400" cy="340" r="52"
    fill="none" stroke="#c8d8f0" stroke-width="0.7" opacity="0.25"/>
  <circle cx="400" cy="340" r="38"
    fill="none" stroke="#c8d8f0" stroke-width="0.4" opacity="0.15"/>
  <text x="400" y="365" font-family="Georgia, serif" font-size="72"
    fill="none" stroke="#dce8f8" stroke-width="0.9" text-anchor="middle"
    opacity="0.55" filter="url(#glow)">D</text>

  <!-- Light particles -->
  <circle cx="162" cy="195" r="1.2" fill="#c8daf0" opacity="0.4"/>
  <circle cx="638" cy="178" r="1" fill="#c8daf0" opacity="0.35"/>
  <circle cx="142" cy="560" r="1.2" fill="#c8daf0" opacity="0.3"/>
  <circle cx="655" cy="545" r="1" fill="#c8daf0" opacity="0.3"/>
  <circle cx="400" cy="148" r="1.5" fill="#c8daf0" opacity="0.45"/>
  <circle cx="400" cy="620" r="1" fill="#c8daf0" opacity="0.25"/>

  <!-- Horizontal rule -->
  <line x1="180" y1="630" x2="620" y2="630"
    stroke="#b0c8e8" stroke-width="0.5" opacity="0.18"/>

  <!-- Diary text -->
  <text x="400" y="665" font-family="Georgia, serif" font-size="14.5"
    fill="#dce8f8" text-anchor="middle" opacity="0.72" letter-spacing="0.8">
    연결을 만드는 일을 했다.
  </text>
  <text x="400" y="688" font-family="Georgia, serif" font-size="12"
    fill="#b0c8e8" text-anchor="middle" opacity="0.45" letter-spacing="0.5">
    끊기지 않기를 바라면서.
  </text>

  <!-- Bottom brand -->
  <text x="400" y="758" font-family="'Helvetica Neue', sans-serif" font-size="10"
    fill="#ffffff" text-anchor="middle" opacity="0.13" letter-spacing="4">DAIRS · 02</text>
</svg>