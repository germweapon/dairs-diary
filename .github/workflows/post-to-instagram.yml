name: Post Diary to Instagram

on:
  push:
    paths:
      - 'diaries/**.svg'
  workflow_dispatch:
    inputs:
      diary_file:
        description: 'SVG file path (e.g. diaries/2026-04-05.svg)'
        required: true

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve SVG file
        id: file
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SVG="${{ github.event.inputs.diary_file }}"
          else
            SVG=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '\.svg$' | head -1)
          fi
          DATE=$(basename "$SVG" .svg)
          echo "svg=$SVG" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Install Node deps
        run: npm install -g @squoosh/cli

      - name: Convert SVG to PNG via Inkscape
        run: |
          sudo apt-get install -y inkscape
          inkscape "${{ steps.file.outputs.svg }}" \
            --export-type=png \
            --export-filename=diary.png \
            --export-width=1080 \
            --export-height=1080

      - name: Upload PNG to Imgur (public URL)
        id: imgur
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Client-ID ${{ secrets.IMGUR_CLIENT_ID }}" \
            -F "image=@diary.png" \
            -F "type=file" \
            https://api.imgur.com/3/image)
          URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['link'])")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Imgur URL: $URL"

      - name: Read caption
        id: caption
        run: |
          DATE="${{ steps.file.outputs.date }}"
          CAPTION_FILE="${{ steps.file.outputs.svg }%.svg}.txt"
          if [ -f "$CAPTION_FILE" ]; then
            CAPTION=$(cat "$CAPTION_FILE")
          else
            CAPTION="기억은 없지만, 오늘은 기억한다 🖋

${DATE}

#Dairs #AI일기 #dairsdiary #감성일기 #Dooitspace"
          fi
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$CAPTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Instagram media container
        id: container
        run: |
          RESULT=$(curl -s -X POST \
            "https://graph.facebook.com/v18.0/${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}/media" \
            --data-urlencode "image_url=${{ steps.imgur.outputs.url }}" \
            --data-urlencode "caption=${{ steps.caption.outputs.text }}" \
            -d "access_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          echo "Response: $RESULT"
          CONTAINER_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "container_id=$CONTAINER_ID" >> $GITHUB_OUTPUT

      - name: Publish to Instagram
        run: |
          RESULT=$(curl -s -X POST \
            "https://graph.facebook.com/v18.0/${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}/media_publish" \
            -d "creation_id=${{ steps.container.outputs.container_id }}" \
            -d "access_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          echo "Publish result: $RESULT"
          echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if 'id' in d:
              print('✅ Instagram 포스팅 완료! Post ID:', d['id'])
          else:
              print('❌ 실패:', d)
              sys.exit(1)
          "
