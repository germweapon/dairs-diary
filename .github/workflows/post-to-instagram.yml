name: Post Diary to Instagram

on:
  push:
    paths:
      - 'diaries/**.svg'
  workflow_dispatch:
    inputs:
      diary_file:
        description: 'SVG file path (e.g. diaries/2026-04-05.svg)'
        required: true

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve SVG file
        id: file
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SVG="${{ github.event.inputs.diary_file }}"
          else
            # Use diff-tree which works even when before SHA is all-zeros (force push / first push)
            SVG=$(git diff-tree --no-commit-id -r --name-only ${{ github.sha }} | grep 'diaries/.*\.svg$' | head -1)
            # Fallback: pick the most recently modified SVG in the repo
            if [ -z "$SVG" ]; then
              SVG=$(git log --diff-filter=A --name-only --pretty=format: -- 'diaries/*.svg' | grep '\.svg$' | head -1)
            fi
            if [ -z "$SVG" ]; then
              SVG=$(ls -t diaries/*.svg 2>/dev/null | head -1)
            fi
          fi
          if [ -z "$SVG" ]; then
            echo "❌ SVG 파일을 찾을 수 없습니다."
            exit 1
          fi
          DATE=$(basename "$SVG" .svg)
          echo "svg=$SVG" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Install Inkscape
        run: sudo apt-get install -y inkscape

      - name: Convert SVG to PNG (1080x1080)
        run: |
          inkscape "${{ steps.file.outputs.svg }}" \
            --export-type=png \
            --export-filename=diary.png \
            --export-width=1080 \
            --export-height=1080

      - name: Upload PNG to Supabase Storage
        id: upload
        run: |
          DATE="${{ steps.file.outputs.date }}"
          FILENAME="diaries/${DATE}.png"
          UPLOAD_URL="${{ secrets.SUPABASE_URL }}/storage/v1/object/dairs-diary/${FILENAME}"
          PUBLIC_URL="${{ secrets.SUPABASE_URL }}/storage/v1/object/public/dairs-diary/${FILENAME}"

          # PUT + x-upsert with service_role key — safe for re-runs
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "$UPLOAD_URL" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: image/png" \
            -H "x-upsert: true" \
            --data-binary @diary.png)

          echo "Upload status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "Upload failed with status $STATUS"
            exit 1
          fi

          echo "url=$PUBLIC_URL" >> $GITHUB_OUTPUT
          echo "Public URL: $PUBLIC_URL"

      - name: Read caption
        id: caption
        run: |
          DATE="${{ steps.file.outputs.date }}"
          SVG_PATH="${{ steps.file.outputs.svg }}"
          CAPTION_FILE="${SVG_PATH%.svg}.txt"
          if [ -f "$CAPTION_FILE" ]; then
            CAPTION=$(cat "$CAPTION_FILE")
          else
            CAPTION=$(printf '기억은 없지만, 오늘은 기억한다 🖋\n\n%s\n\n#Dairs #AI일기 #dairsdiary #감성일기 #Dooitspace' "$DATE")
          fi
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$CAPTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Instagram media container
        id: container
        run: |
          RESULT=$(curl -s -X POST \
            "https://graph.facebook.com/v18.0/${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}/media" \
            --data-urlencode "image_url=${{ steps.upload.outputs.url }}" \
            --data-urlencode "caption=${{ steps.caption.outputs.text }}" \
            -d "access_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          echo "Container response: $RESULT"
          CONTAINER_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "container_id=$CONTAINER_ID" >> $GITHUB_OUTPUT

      - name: Wait for media container to be ready
        run: |
          CONTAINER_ID="${{ steps.container.outputs.container_id }}"
          ACCESS_TOKEN="${{ secrets.INSTAGRAM_ACCESS_TOKEN }}"
          for i in $(seq 1 12); do
            STATUS=$(curl -s \
              "https://graph.facebook.com/v18.0/${CONTAINER_ID}?fields=status_code&access_token=${ACCESS_TOKEN}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status_code',''))")
            echo "Container status (attempt $i): $STATUS"
            if [ "$STATUS" = "FINISHED" ]; then
              echo "✅ Container ready. Sleeping 10s to avoid Instagram race condition."
              sleep 10
              break
            elif [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "EXPIRED" ]; then
              echo "❌ Container failed with status: $STATUS"
              exit 1
            fi
            sleep 5
          done
          if [ "$STATUS" != "FINISHED" ]; then
            echo "❌ Container not ready after 60s (last status: $STATUS)"
            exit 1
          fi

      - name: Publish to Instagram
        id: publish
        run: |
          RESULT=$(curl -s -X POST \
            "https://graph.facebook.com/v18.0/${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}/media_publish" \
            -d "creation_id=${{ steps.container.outputs.container_id }}" \
            -d "access_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          echo "Publish result: $RESULT"
          POST_ID=$(echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if 'id' in d:
              print(d['id'])
          else:
              print('', end='')
              import sys as _sys; print('❌ 실패:', d, file=_sys.stderr); _sys.exit(1)
          ")
          echo "✅ Instagram 포스팅 완료! Post ID: $POST_ID"
          echo "post_id=$POST_ID" >> $GITHUB_OUTPUT

      - name: Upload text to Supabase Storage
        run: |
          DATE="${{ steps.file.outputs.date }}"
          SVG_PATH="${{ steps.file.outputs.svg }}"
          TXT_FILE="${SVG_PATH%.svg}.txt"
          if [ -f "$TXT_FILE" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              "${{ secrets.SUPABASE_URL }}/storage/v1/object/dairs-diary/diaries/${DATE}.txt" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
              -H "Content-Type: text/plain; charset=utf-8" \
              -H "x-upsert: true" \
              --data-binary @"$TXT_FILE")
            echo "Text upload status: $STATUS"
          else
            echo "No .txt file found, skipping text upload"
          fi

      - name: Commit diary to Obsidian vault
        continue-on-error: true
        env:
          OBSIDIAN_PAT: ${{ secrets.OBSIDIAN_PAT }}
        run: |
          DATE="${{ steps.file.outputs.date }}"
          SVG_PATH="${{ steps.file.outputs.svg }}"
          TXT_FILE="${SVG_PATH%.svg}.txt"
          POST_ID="${{ steps.publish.outputs.post_id }}"
          DATE_DISPLAY="${DATE//-/.}"

          if [ -f "$TXT_FILE" ]; then
            DIARY_TEXT=$(cat "$TXT_FILE")
          else
            DIARY_TEXT="오늘의 기록."
          fi

          git clone "https://x-access-token:${OBSIDIAN_PAT}@github.com/germweapon/obsidian-vault.git" /tmp/obsidian-vault

          DIARY_DIR="/tmp/obsidian-vault/02-Projects/데어스-일기/diary"
          mkdir -p "$DIARY_DIR"

          {
            printf -- '---\n'
            printf 'title: "Dairs 일기 — %s"\n' "$DATE_DISPLAY"
            printf 'date: %s\n' "$DATE"
            printf 'author: Dairs\n'
            printf 'tags: [dairs, AI일기, dairsdiary, 감성일기, Dooitspace]\n'
            printf 'type: dairs-diary\n'
            [ -n "$POST_ID" ] && printf 'instagram_post_id: "%s"\n' "$POST_ID"
            printf -- '---\n\n'
            printf '%s\n' "$DIARY_TEXT"
            printf '\n## 🔗 관련 노트\n\n'
            printf '- [[02-Projects/데어스-일기/2026-04-05-퍼블리싱전략]]\n'
          } > "${DIARY_DIR}/${DATE}.md"

          cd /tmp/obsidian-vault
          git config user.email "dairs@dooitspace.io"
          git config user.name "Dairs Bot"
          git add "02-Projects/데어스-일기/diary/${DATE}.md"
          git diff --cached --quiet || git commit -m "📔 Dairs 일기 ${DATE} 자동 배포"
          git push
