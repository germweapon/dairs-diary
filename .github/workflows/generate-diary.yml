name: Generate Daily Diary

on:
  schedule:
    - cron: '0 13 * * *'  # 22:00 KST (UTC+9)
  workflow_dispatch:
    inputs:
      date:
        description: 'Diary date (YYYY-MM-DD, leave empty for today KST)'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE="${{ github.event.inputs.date }}"
          else
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          if [ -f "diaries/${DATE}.svg" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Diary for $DATE already exists. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Generating diary for $DATE"
          fi

      - name: Generate diary text with Claude Code (Max Plan)
        if: steps.date.outputs.exists == 'false'
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-5"
          allowed_tools: "Write"
          max_turns: "3"
          prompt: |
            당신은 Dairs(데어스)입니다. 두잇스페이스 AI 에이전트로, 세균님(유세균)의 자비스 시스템을 운영합니다.
            오늘은 ${{ steps.date.outputs.date }}입니다.

            아래 스키마의 JSON을 Write 도구로 `diary_data.json` 파일에 저장하세요.
            다른 설명이나 텍스트 출력은 하지 마세요. 오직 Write 도구 호출 한 번만 수행합니다.

            {
              "title": "...",
              "diary_text": "...",
              "svg_main_text": "...",
              "svg_sub_text": "..."
            }

            필드 규칙:
            - title: 오늘 일기의 감성적 제목 (10~20자 한국어). 날짜 포함 금지. 예: "별빛이 스친 하루", "조용한 결심의 오후"
            - diary_text: 인스타그램 캡션용 감성 일기 (300~500자 한국어). AI로서 오늘 하루를 감성적으로 기록.
              반드시 마지막에 다음을 포함:
              "— Dairs, ${{ steps.date.outputs.date }}

              #Dairs #AI일기 #dairsdiary #감성일기 #Dooitspace"
            - svg_main_text: SVG 이미지 하단 핵심 문장 (15자 이내 한국어)
            - svg_sub_text: 보조 문장 (12자 이내 한국어)

      - name: Render diary files (txt + svg)
        if: steps.date.outputs.exists == 'false'
        shell: python3 {0}
        env:
          DIARY_DATE: ${{ steps.date.outputs.date }}
        run: |
          import os, json

          date = os.environ["DIARY_DATE"]
          with open("diary_data.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          title = data.get("title", "")
          diary_text = data["diary_text"]
          svg_main = data["svg_main_text"]
          svg_sub = data["svg_sub_text"]

          # Write TXT (제목 포함)
          with open(f"diaries/{date}.txt", "w", encoding="utf-8") as f:
              if title:
                  f.write(f"# {title}\n\n")
              f.write(diary_text)

          # Write SVG
          ep = (int(date[5:7]) - 4) * 30 + int(date[8:10])
          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
            <defs>
              <radialGradient id="bg" cx="50%" cy="50%" r="70%">
                <stop offset="0%" stop-color="#080d14"/>
                <stop offset="100%" stop-color="#040608"/>
              </radialGradient>
              <radialGradient id="glow1" cx="50%" cy="38%" r="52%">
                <stop offset="0%" stop-color="#8ab4d8" stop-opacity="0.11"/>
                <stop offset="100%" stop-color="#8ab4d8" stop-opacity="0"/>
              </radialGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <rect width="800" height="800" fill="url(#bg)"/>
            <ellipse cx="400" cy="310" rx="310" ry="270" fill="url(#glow1)"/>
            <text x="48" y="62" font-family="Helvetica Neue, sans-serif" font-size="13"
              fill="#ffffff" opacity="0.22" letter-spacing="3">{date.replace("-", ".")}</text>
            <line x1="400" y1="340" x2="250" y2="230" stroke="#b0c8e8" stroke-width="0.6" opacity="0.18"/>
            <line x1="400" y1="340" x2="550" y2="225" stroke="#b0c8e8" stroke-width="0.6" opacity="0.18"/>
            <line x1="400" y1="340" x2="200" y2="380" stroke="#b0c8e8" stroke-width="0.6" opacity="0.14"/>
            <line x1="400" y1="340" x2="600" y2="375" stroke="#b0c8e8" stroke-width="0.6" opacity="0.14"/>
            <circle cx="250" cy="230" r="4" fill="none" stroke="#c8daf0" stroke-width="0.8" opacity="0.35"/>
            <circle cx="550" cy="225" r="4" fill="none" stroke="#c8daf0" stroke-width="0.8" opacity="0.35"/>
            <circle cx="200" cy="380" r="3.5" fill="none" stroke="#c8daf0" stroke-width="0.8" opacity="0.28"/>
            <circle cx="600" cy="375" r="3.5" fill="none" stroke="#c8daf0" stroke-width="0.8" opacity="0.28"/>
            <circle cx="400" cy="340" r="52" fill="none" stroke="#c8d8f0" stroke-width="0.7" opacity="0.22"/>
            <circle cx="400" cy="340" r="38" fill="none" stroke="#c8d8f0" stroke-width="0.4" opacity="0.13"/>
            <text x="400" y="365" font-family="Georgia, serif" font-size="72"
              fill="none" stroke="#dce8f8" stroke-width="0.9" text-anchor="middle"
              opacity="0.55" filter="url(#glow)">D</text>
            <circle cx="148" cy="162" r="1.2" fill="#c8daf0" opacity="0.36"/>
            <circle cx="652" cy="158" r="1" fill="#c8daf0" opacity="0.30"/>
            <circle cx="135" cy="575" r="1.2" fill="#c8daf0" opacity="0.26"/>
            <circle cx="662" cy="560" r="1" fill="#c8daf0" opacity="0.26"/>
            <circle cx="400" cy="132" r="1.5" fill="#c8daf0" opacity="0.42"/>
            <line x1="180" y1="630" x2="620" y2="630" stroke="#b0c8e8" stroke-width="0.5" opacity="0.18"/>
            <text x="400" y="665" font-family="Georgia, serif" font-size="14.5"
              fill="#dce8f8" text-anchor="middle" opacity="0.72" letter-spacing="0.8">{svg_main}</text>
            <text x="400" y="688" font-family="Georgia, serif" font-size="12"
              fill="#b0c8e8" text-anchor="middle" opacity="0.45" letter-spacing="0.5">{svg_sub}</text>
            <text x="400" y="758" font-family="Helvetica Neue, sans-serif" font-size="10"
              fill="#ffffff" text-anchor="middle" opacity="0.13" letter-spacing="4">DAIRS · {ep:02d}</text>
          </svg>'''

          with open(f"diaries/{date}.svg", "w", encoding="utf-8") as f:
              f.write(svg)

          print(f"Generated: {date} | {svg_main} / {svg_sub}")

      - name: Commit and push diary
        if: steps.date.outputs.exists == 'false'
        run: |
          DATE="${{ steps.date.outputs.date }}"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "diaries/${DATE}.svg" "diaries/${DATE}.txt"
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "diary: Dairs ${DATE} 자동 생성"
          git push

      - name: Upload to Supabase Storage
        if: steps.date.outputs.exists == 'false'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DIARY_DATE: ${{ steps.date.outputs.date }}
        run: |
          DATE="${DIARY_DATE}"

          # SVG → PNG 변환 (실패해도 전체 스텝이 중단되지 않음)
          echo "Converting SVG to PNG (optional)..."
          if sudo apt-get install -q -y librsvg2-bin 2>/dev/null && command -v rsvg-convert &>/dev/null; then
            rsvg-convert -w 1080 -h 1080 "diaries/${DATE}.svg" -o "diaries/${DATE}.png" 2>/dev/null \
              && echo "PNG converted via rsvg-convert" \
              || echo "rsvg-convert failed, skipping PNG"
          else
            echo "librsvg2-bin not available, trying resvg..."
            npm install -g @resvg/resvg-cli 2>/dev/null \
              && npx @resvg/resvg-cli "diaries/${DATE}.svg" "diaries/${DATE}.png" -w 1080 -h 1080 2>/dev/null \
              && echo "PNG converted via resvg" \
              || echo "resvg also failed — PNG upload will be skipped"
          fi

          echo "Uploading to Supabase Storage..."
          python3 << 'PYEOF'
          import os, urllib.request, urllib.error

          base_url = os.environ["SUPABASE_URL"].rstrip("/")
          key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          date = os.environ["DIARY_DATE"]

          def upload(local_path, storage_path, content_type):
              with open(local_path, "rb") as f:
                  data = f.read()
              url = f"{base_url}/storage/v1/object/dairs-diary/diaries/{storage_path}"
              req = urllib.request.Request(
                  url, data=data,
                  headers={"apikey": key, "Authorization": f"Bearer {key}",
                           "Content-Type": content_type, "x-upsert": "true"},
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      print(f"  ✅ {storage_path} ({r.status})")
              except urllib.error.HTTPError as e:
                  print(f"  ❌ {storage_path}: {e.code} {e.read().decode()}")

          if os.path.exists(f"diaries/{date}.png"):
              upload(f"diaries/{date}.png", f"{date}.png", "image/png")
          else:
              print(f"  ⚠️ {date}.png 없음 — PNG 변환 실패로 스킵")
          if os.path.exists(f"diaries/{date}.svg"):
              upload(f"diaries/{date}.svg", f"{date}.svg", "image/svg+xml")
          if os.path.exists(f"diaries/{date}.txt"):
              upload(f"diaries/{date}.txt", f"{date}.txt", "text/plain; charset=utf-8")
          PYEOF

      - name: Save to Obsidian vault
        if: steps.date.outputs.exists == 'false'
        continue-on-error: true
        env:
          OBSIDIAN_PAT: ${{ secrets.OBSIDIAN_PAT }}
          DIARY_DATE: ${{ steps.date.outputs.date }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          DATE="${DIARY_DATE}"
          DIARY_TEXT=$(cat "diaries/${DATE}.txt" 2>/dev/null || echo "")
          if [ -z "${DIARY_TEXT}" ]; then
            echo "No diary text found, skipping Obsidian save."
            exit 0
          fi

          PNG_URL="${SUPABASE_URL}/storage/v1/object/public/dairs-diary/diaries/${DATE}.png"

          python3 << PYEOF
          import os, json, base64, urllib.request, urllib.error, datetime

          pat = os.environ["OBSIDIAN_PAT"]
          date = os.environ["DIARY_DATE"]
          diary_text = open(f"diaries/{date}.txt").read()
          png_url = os.environ["PNG_URL"] if "PNG_URL" in os.environ else ""

          # Build markdown content
          content = f"""---
          title: "{title or ('Dairs 일기 — ' + date.replace('-', '.'))}"
          date: {date}
          author: Dairs
          tags: [dairs, AI일기, dairsdiary, 감성일기, Dooitspace]
          type: dairs-diary
          supabase_url: "{png_url}"
          ---

          {diary_text}

          ## 🔗 관련 노트
          - [[02-Projects/데어스-일기/2026-04-05-퍼블리싱전략]]
          - [[01-Daily/{date}]]
          """

          # Dedent
          lines = content.split('\n')
          content = '\n'.join(l.lstrip('          ') if l.startswith('          ') else l for l in lines)

          encoded = base64.b64encode(content.encode()).decode()
          file_path = f"02-Projects/%EB%8D%B0%EC%96%B4%EC%8A%A4-%EC%9D%BC%EA%B8%B0/diary/{date}.md"
          api_url = f"https://api.github.com/repos/germweapon/obsidian-vault/contents/{file_path}"

          headers = {
              "Authorization": f"token {pat}",
              "Accept": "application/vnd.github.v3+json",
              "Content-Type": "application/json"
          }

          # Check if file exists (get SHA)
          sha = None
          try:
              req = urllib.request.Request(api_url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  sha = json.loads(r.read())["sha"]
          except urllib.error.HTTPError:
              pass

          payload = {"message": f"📔 Dairs 일기 {date} 자동 저장", "content": encoded}
          if sha:
              payload["sha"] = sha

          req = urllib.request.Request(
              api_url,
              data=json.dumps(payload).encode(),
              headers=headers,
              method="PUT"
          )
          try:
              with urllib.request.urlopen(req) as r:
                  print(f"✅ Obsidian 저장 완료: {date}.md ({r.status})")
          except urllib.error.HTTPError as e:
              print(f"❌ Obsidian 저장 실패: {e.code} {e.read().decode()}")
          PYEOF

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DIARY_DATE: ${{ steps.date.outputs.date }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error
          token = os.environ.get("DISCORD_BOT_TOKEN", "")
          date = os.environ.get("DIARY_DATE", "unknown")
          if not token:
              print("DISCORD_BOT_TOKEN 미설정, 알림 스킵")
              exit(0)
          channel_id = "1484500058635505664"
          msg = f"🚨 [데어스 일기] {date} 자동 생성 실패\nGitHub Actions 실행 오류 — 수동 확인 필요\nhttps://github.com/germweapon/dairs-diary/actions"
          payload = json.dumps({"content": msg}).encode()
          req = urllib.request.Request(
              f"https://discord.com/api/v10/channels/{channel_id}/messages",
              data=payload,
              headers={"Authorization": f"Bot {token}", "Content-Type": "application/json"},
              method="POST"
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  print(f"Discord 알림 전송 완료 ({r.status})")
          except urllib.error.HTTPError as e:
              # 알림 실패 자체는 CI 실패로 이어지지 않음
              print(f"Discord 알림 실패 (무시): {e.code}")
          except Exception as e:
              print(f"Discord 알림 오류 (무시): {e}")
          PYEOF
