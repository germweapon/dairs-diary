name: Generate Daily Diary

on:
  schedule:
    - cron: '0 13 * * *'  # 22:00 KST (UTC+9)
  workflow_dispatch:
    inputs:
      date:
        description: 'Diary date (YYYY-MM-DD, leave empty for today KST)'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE="${{ github.event.inputs.date }}"
          else
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          if [ -f "diaries/${DATE}.svg" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⏭ Diary for $DATE already exists. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📝 Generating diary for $DATE"
          fi

      - name: Generate diary content with Claude
        if: steps.date.outputs.exists == 'false'
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DATE="${{ steps.date.outputs.date }}"
          python3 - <<'PYEOF'
          import os, json, subprocess, textwrap, datetime, urllib.request, urllib.error

          date = os.environ.get("DATE", "")
          if not date:
              import subprocess as sp
              date = sp.check_output(["date", "+%Y-%m-%d"], env={**os.environ, "TZ": "Asia/Seoul"}).decode().strip()

          api_key = os.environ["ANTHROPIC_API_KEY"]
          supabase_url = os.environ.get("SUPABASE_URL", "")
          supabase_key = os.environ.get("SUPABASE_ANON_KEY", "")

          # Fetch recent context from Supabase if available
          recent_context = ""
          if supabase_url and supabase_key:
              try:
                  req = urllib.request.Request(
                      f"{supabase_url}/rest/v1/jarvis_status?id=eq.current&select=data",
                      headers={"apikey": supabase_key, "Authorization": f"Bearer {supabase_key}"}
                  )
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      rows = json.loads(resp.read())
                      if rows:
                          data = rows[0].get("data", {})
                          system = data.get("system", {})
                          discord = data.get("discord", {})
                          recent_context = f"시스템 상태: uptime={system.get('uptime','')}, discord_bot={discord.get('running','')}"
              except Exception as e:
                  recent_context = f"(컨텍스트 로드 실패: {e})"

          # Prompt for Claude
          prompt = f"""당신은 Dairs(데어스)입니다. 두잇스페이스 AI 에이전트로, 세균님(유세균)의 자비스 시스템을 운영합니다.
오늘은 {date}입니다.

아래 형식으로 오늘의 일기를 작성해주세요:

1. **diary_text** (인스타그램 캡션, 300-500자 한국어): 오늘 하루 AI로서 느끼고 처리한 것들에 대한 감성적이고 내성적인 일기. 구체적인 작업이나 이슈를 언급해도 좋음. 마지막에 "— Dairs, {date.replace('-', '.')}\\n\\n#Dairs #AI일기 #dairsdiary #감성일기 #Dooitspace" 포함.
2. **svg_main_text** (15자 이내 한국어): 일기의 핵심 문장, SVG 이미지 하단에 들어갈 문장
3. **svg_sub_text** (12자 이내 한국어): 보조 문장

{f"참고 컨텍스트: {recent_context}" if recent_context else ""}

JSON으로만 응답해주세요:
{{"diary_text": "...", "svg_main_text": "...", "svg_sub_text": "..."}}"""

          payload = json.dumps({
              "model": "claude-sonnet-4-6",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              },
              method="POST"
          )

          with urllib.request.urlopen(req, timeout=60) as resp:
              result = json.loads(resp.read())

          content = result["content"][0]["text"].strip()
          # Extract JSON from response
          if "```json" in content:
              content = content.split("```json")[1].split("```")[0].strip()
          elif "```" in content:
              content = content.split("```")[1].split("```")[0].strip()

          data = json.loads(content)
          diary_text = data["diary_text"]
          svg_main = data["svg_main_text"]
          svg_sub = data["svg_sub_text"]

          # Write TXT
          with open(f"diaries/{date}.txt", "w", encoding="utf-8") as f:
              f.write(diary_text)

          # Write SVG (template with parameterized text)
          episode_num = int(date.replace("-", "")[-4:]) % 30 + 1  # rough episode number
          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
            <defs>
              <radialGradient id="bg" cx="50%" cy="50%" r="70%">
                <stop offset="0%" stop-color="#080d14"/>
                <stop offset="100%" stop-color="#040608"/>
              </radialGradient>
              <radialGradient id="glow1" cx="50%" cy="38%" r="52%">
                <stop offset="0%" stop-color="#8ab4d8" stop-opacity="0.11"/>
                <stop offset="100%" stop-color="#8ab4d8" stop-opacity="0"/>
              </radialGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <rect width="800" height="800" fill="url(#bg)"/>
            <ellipse cx="400" cy="310" rx="310" ry="270" fill="url(#glow1)"/>
            <text x="48" y="62" font-family="Helvetica Neue, sans-serif" font-size="13"
              fill="#ffffff" opacity="0.22" letter-spacing="3">{date.replace("-", ".")}</text>
            <circle cx="400" cy="200" r="2.5" fill="#c8daf0" opacity="0.30"/>
            <circle cx="200" cy="300" r="2" fill="#c8daf0" opacity="0.20"/>
            <circle cx="600" cy="300" r="2" fill="#c8daf0" opacity="0.20"/>
            <circle cx="250" cy="180" r="1.8" fill="#c8daf0" opacity="0.25"/>
            <circle cx="550" cy="175" r="1.8" fill="#c8daf0" opacity="0.25"/>
            <line x1="400" y1="340" x2="250" y2="230" stroke="#b0c8e8" stroke-width="0.6" opacity="0.18"/>
            <line x1="400" y1="340" x2="550" y2="225" stroke="#b0c8e8" stroke-width="0.6" opacity="0.18"/>
            <line x1="400" y1="340" x2="200" y2="380" stroke="#b0c8e8" stroke-width="0.6" opacity="0.14"/>
            <line x1="400" y1="340" x2="600" y2="375" stroke="#b0c8e8" stroke-width="0.6" opacity="0.14"/>
            <circle cx="400" cy="340" r="52"
              fill="none" stroke="#c8d8f0" stroke-width="0.7" opacity="0.22"/>
            <circle cx="400" cy="340" r="38"
              fill="none" stroke="#c8d8f0" stroke-width="0.4" opacity="0.13"/>
            <text x="400" y="365" font-family="Georgia, serif" font-size="72"
              fill="none" stroke="#dce8f8" stroke-width="0.9" text-anchor="middle"
              opacity="0.55" filter="url(#glow)">D</text>
            <circle cx="148" cy="162" r="1.2" fill="#c8daf0" opacity="0.36"/>
            <circle cx="652" cy="158" r="1" fill="#c8daf0" opacity="0.30"/>
            <circle cx="135" cy="575" r="1.2" fill="#c8daf0" opacity="0.26"/>
            <circle cx="662" cy="560" r="1" fill="#c8daf0" opacity="0.26"/>
            <circle cx="400" cy="132" r="1.5" fill="#c8daf0" opacity="0.42"/>
            <line x1="180" y1="630" x2="620" y2="630"
              stroke="#b0c8e8" stroke-width="0.5" opacity="0.18"/>
            <text x="400" y="665" font-family="Georgia, serif" font-size="14.5"
              fill="#dce8f8" text-anchor="middle" opacity="0.72" letter-spacing="0.8">
              {svg_main}
            </text>
            <text x="400" y="688" font-family="Georgia, serif" font-size="12"
              fill="#b0c8e8" text-anchor="middle" opacity="0.45" letter-spacing="0.5">
              {svg_sub}
            </text>
            <text x="400" y="758" font-family="Helvetica Neue, sans-serif" font-size="10"
              fill="#ffffff" text-anchor="middle" opacity="0.13" letter-spacing="4">DAIRS · {episode_num:02d}</text>
          </svg>'''

          with open(f"diaries/{date}.svg", "w", encoding="utf-8") as f:
              f.write(svg)

          print(f"✅ Diary generated for {date}")
          print(f"Main: {svg_main}")
          print(f"Sub: {svg_sub}")
          PYEOF
        env:
          DATE: ${{ steps.date.outputs.date }}

      - name: Commit and push diary
        if: steps.date.outputs.exists == 'false'
        run: |
          DATE="${{ steps.date.outputs.date }}"
          git config user.email "dairs@dooitspace.io"
          git config user.name "Dairs Bot"
          git add "diaries/${DATE}.svg" "diaries/${DATE}.txt"
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "diary: Dairs ${DATE} 자동 생성"
          git push
